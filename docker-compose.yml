version: '3'
services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3001:3001"
    volumes:
      - .:/usr/src/app
      - /usr/src/app/node_modules
    environment:
      - NODE_ENV=production
    command: npm run start:prod

  dwn-server:
    platform: linux/amd64
    image: ghcr.io/tbd54566975/dwn-server:main
    ports:
      - "3001:3001"
    volumes:
      - dwn-data:/dwn-server/data

  ssi-service:
    image: ghcr.io/tbd54566975/ssi-service:sha-9469ac2
    ports:
      - "3000:3000"

  database:
    image: mysql:8.0
    command: --default-authentication-plugin=mysql_native_password
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: root_password
      MYSQL_DATABASE: iovf-identity
      MYSQL_USER: user
      MYSQL_PASSWORD: password
    volumes:
      - db-data:/var/lib/mysql

volumes:
  db-data:
  dwn-data: