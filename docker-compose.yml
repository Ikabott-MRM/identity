version: '3'
services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3001:3001"
    volumes:
      - .:/usr/src/app
      - /usr/src/app/node_modules
    environment:
      - NODE_ENV=production
    command: npm run start:prod

  dwn-server:
    platform: linux/amd64
    image: ghcr.io/tbd54566975/dwn-server:main
    ports:
      - "3001:3001"
    volumes:
      - dwn-data:/dwn-server/data

  ssi-service:
    image: ghcr.io/tbd54566975/ssi-service:sha-9469ac2
    ports:
      - "3000:3000"

  database:
    image: postgres:13
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: iovf-identity
    volumes:
      - db-data:/var/lib/postgresql/data

volumes:
  db-data:
  dwn-data: