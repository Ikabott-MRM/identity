[profile.default]
src      = "contracts"
test     = "test/foundry"
out      = "foundry-out"
libs     = ["node_modules", "lib"]
remappings = [
    "@openzeppelin/=node_modules/@openzeppelin/"
]

[fuzz]
runs = 1000

[invariant]
# Pre-mainnet deep profile: 500 runs × 100 calls per sequence (~5× wall time vs 200×50).
# Expect several minutes for `forge test` on a typical machine.
runs   = 500
depth  = 100
