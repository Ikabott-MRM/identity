name: deploy-sbweb3-prod

on:
  push:
    tags:
      - 'sbweb3-prod*'

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: us-east-1

      - name: Deploy on EC2 via SSM (prod)
        run: |
          set -euo pipefail
          INSTANCE_ID="${{ secrets.EC2_INSTANCE_ID_PROD }}"
          TAG="${GITHUB_REF_NAME}"

          if [[ -z "${INSTANCE_ID}" || "${INSTANCE_ID}" == "[]" ]]; then
            echo "EC2_INSTANCE_ID_PROD secret is empty. Add it under Settings → Secrets and variables → Actions."
            exit 1
          fi

          PARAMS_JSON="$(jq -n --arg tag "$TAG" --arg repo_ssh "git@github.com:Ikabott-MRM/identity.git" --arg repo_https "https://github.com/Ikabott-MRM/identity.git" \
            '{commands:["sudo -u ubuntu -H bash -lc \"set -euo pipefail && cd /home/ubuntu/identity && if test -f /home/ubuntu/.ssh/id_ed25519; then git remote set-url origin \($repo_ssh); export GIT_SSH_COMMAND=\\\"ssh -o StrictHostKeyChecking=accept-new\\\"; else git remote set-url origin \($repo_https); fi && git fetch --prune --tags --force origin || (echo FETCH_FAILED_CHECK_REPO_ACCESS; echo If the repo is private: add a GitHub Deploy Key to /home/ubuntu/.ssh/id_ed25519; echo If you made it public: ensure the remote is reachable via HTTPS.; exit 1) && git rev-parse -q --verify refs/tags/\($tag) >/dev/null || (echo TAG_NOT_FOUND:\($tag); git tag -l \\\"sbweb3-prod*\\\" | tail -n 50; exit 1) && git checkout -f \($tag) && docker compose up -d --build --no-deps api\""]}')"

          COMMAND_ID="$(aws ssm send-command \
            --instance-ids "$INSTANCE_ID" \
            --document-name "AWS-RunShellScript" \
            --comment "Deploy prod tag $TAG" \
            --parameters "$PARAMS_JSON" \
            --query 'Command.CommandId' --output text)"
          echo "SSM CommandId=$COMMAND_ID instance=$INSTANCE_ID"

          for _ in $(seq 1 120); do
            if ! RAW="$(aws ssm get-command-invocation --command-id "$COMMAND_ID" --instance-id "$INSTANCE_ID" --output json 2>/dev/null)"; then
              sleep 3
              continue
            fi
            STATUS="$(echo "$RAW" | jq -r .Status)"
            if [[ "$STATUS" == "Success" ]]; then
              echo "=== SSM stdout (tail) ==="
              echo "$RAW" | jq -r .StandardOutputContent | tail -n 80
              echo "=== SSM stderr (tail) ==="
              echo "$RAW" | jq -r .StandardErrorContent | tail -n 80
              exit 0
            fi
            if [[ "$STATUS" == "Failed" || "$STATUS" == "Cancelled" || "$STATUS" == "TimedOut" || "$STATUS" == "Cancelling" ]]; then
              echo "$RAW" | jq .
              exit 1
            fi
            sleep 3
          done
          echo "Timeout waiting for SSM command $COMMAND_ID"
          exit 1
