name: Deploy to EC2

on:
  push:
    branches:
      - dev
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up SSH
        uses: webfactory/ssh-agent@v0.5.4
        with:
          ssh-private-key: ${{ secrets.EC2_SSH_KEY }}

      - name: Deploy to EC2 via SSH
        run: |
          ssh -o StrictHostKeyChecking=no ${{ secrets.EC2_HOST }} << EOF
            cd ~/identity

            # Escribir el archivo .env desde el secret
            echo "${{ secrets.DEV_ENV_FILE }}" > .env

            git checkout dev
            git pull origin dev
            docker compose down
            docker compose build
            docker compose up -d

            docker compose ps
            docker compose logs --tail=30 api
          EOF
