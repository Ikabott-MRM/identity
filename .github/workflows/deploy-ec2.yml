name: Deploy to EC2

on:
  push:
    branches:
      - dev
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up SSH
        uses: webfactory/ssh-agent@v0.5.4
        with:
          ssh-private-key: ${{ secrets.EC2_SSH_KEY }}

      - name: Deploy to EC2 via SSH
        env:
          SECRET_PWD: ${{ secrets.SECRET_PWD }}
          SALT_ISSUER_DID: ${{ secrets.SALT_ISSUER_DID }}
          SALT_ISSUER_CREDENTIALS: ${{ secrets.SALT_ISSUER_CREDENTIALS }}
          PINATA_JWT_TOKEN: ${{ secrets.PINATA_JWT_TOKEN }}
          MAIL_PASSWORD: ${{ secrets.MAIL_PASSWORD }}
        run: |
          ssh -o StrictHostKeyChecking=no ${{ secrets.EC2_HOST }} << 'EOF'
            set -e

            cd ~/identity

            # Leer variables existentes del .env si existe
            if [ -f .env ]; then
              export $(grep -v '^#' .env | xargs -d '\n' || true)
            fi

            # Construir .env limpio (sobre-escribiendo anterior)
            cat <<EOT > .env
ISSUER_DID_CID=${ISSUER_DID_CID:-$ISSUER_DID_CID}
DWN_URL=''
SSI_PROJECT_NAME='TBD'
GATEWAY_URI=https://dht.iovf.org
DB_USER=user
DB_PASSWORD='password'
DB_HOST=database
DB_NAME=iovf-identity
MAILER_TRANSPORT_HOST='smtp.gmail.com'
MAIL_USER='ida@iovf.org'
MAIL_PASSWORD='${MAIL_PASSWORD}'
SECRET_PWD='${SECRET_PWD}'
SALT_ISSUER_DID='${SALT_ISSUER_DID}'
SALT_ISSUER_CREDENTIALS='${SALT_ISSUER_CREDENTIALS}'
MAIL_ADDRESS='ida@iovf.org'
PINATA_GATEWAY='https://gateway.pinata.cloud'
PINATA_JWT_TOKEN='${PINATA_JWT_TOKEN}'
EOT

            git checkout dev
            git pull origin dev
            docker compose down
            docker compose build
            docker compose up -d

            sleep 10

            # Buscar nuevo CID del deploy en logs
            CID=\$(docker compose logs api | grep "Encrypted issuer Did file has been uploaded to IPFS" | tail -1 | awk -F'CID:' '{print \$2}' | xargs)

            if [ ! -z "\$CID" ]; then
              echo "Nuevo CID detectado: \$CID"
              # Actualizar ISSUER_DID_CID en .env
              sed -i "/^ISSUER_DID_CID=/d" .env
              echo "ISSUER_DID_CID=\$CID" >> .env
            else
              echo "No se detectó nuevo CID en los logs del deploy."
            fi

            docker compose ps
            docker compose logs --tail=30 api
          EOF