name: Deploy to EC2

on:
  push:
    branches:
      - dev
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up SSH
        uses: webfactory/ssh-agent@v0.5.4
        with:
          ssh-private-key: ${{ secrets.EC2_SSH_KEY }}

      - name: Check all secrets are present
        run: |
          echo "Checking secrets..."
          if [ -z "${{ secrets.ISSUER_DID_CID }}" ]; then
            echo "Missing secret: ISSUER_DID_CID"; exit 1
          fi
          if [ -z "${{ secrets.MAIL_PASSWORD }}" ]; then
            echo "Missing secret: MAIL_PASSWORD"; exit 1
          fi
          if [ -z "${{ secrets.SECRET_PWD }}" ]; then
            echo "Missing secret: SECRET_PWD"; exit 1
          fi
          if [ -z "${{ secrets.SALT_ISSUER_DID }}" ]; then
            echo "Missing secret: SALT_ISSUER_DID"; exit 1
          fi
          if [ -z "${{ secrets.SALT_ISSUER_CREDENTIALS }}" ]; then
            echo "Missing secret: SALT_ISSUER_CREDENTIALS"; exit 1
          fi
          if [ -z "${{ secrets.PINATA_GATEWAY }}" ]; then
            echo "Missing secret: PINATA_GATEWAY"; exit 1
          fi
          if [ -z "${{ secrets.PINATA_JWT_TOKEN }}" ]; then
            echo "Missing secret: PINATA_JWT_TOKEN"; exit 1
          fi
          echo "All required secrets exist."

      - name: Deploy to EC2 via SSH
        env:
          ISSUER_DID_CID: ${{ secrets.ISSUER_DID_CID }}
          MAIL_PASSWORD: ${{ secrets.MAIL_PASSWORD }}
          SECRET_PWD: ${{ secrets.SECRET_PWD }}
          SALT_ISSUER_DID: ${{ secrets.SALT_ISSUER_DID }}
          SALT_ISSUER_CREDENTIALS: ${{ secrets.SALT_ISSUER_CREDENTIALS }}
          PINATA_GATEWAY: ${{ secrets.PINATA_GATEWAY }}
          PINATA_JWT_TOKEN: ${{ secrets.PINATA_JWT_TOKEN }}
        run: |
          ssh -o StrictHostKeyChecking=no ${{ secrets.EC2_HOST }} << EOF
            set -e

            cd ~/identity

            echo "Overwriting .env file..."
            cat > .env <<EOT
ISSUER_DID_CID=${ISSUER_DID_CID}
DWN_URL=''
SSI_PROJECT_NAME='TBD'
GATEWAY_URI=https://dht.iovf.org
DB_USER=user
DB_PASSWORD='password'
DB_HOST=database
DB_NAME=iovf-identity
MAILER_TRANSPORT_HOST='smtp.gmail.com'
MAIL_USER='ida@iovf.org'
MAIL_PASSWORD=${MAIL_PASSWORD}
SECRET_PWD=${SECRET_PWD}
SALT_ISSUER_DID=${SALT_ISSUER_DID}
SALT_ISSUER_CREDENTIALS=${SALT_ISSUER_CREDENTIALS}
MAIL_ADDRESS=ida@iovf.org
PINATA_GATEWAY=${PINATA_GATEWAY}
PINATA_JWT_TOKEN=${PINATA_JWT_TOKEN}
EOT

            echo ".env generated:"
            cat .env

            echo "Starting deploy..."
            git checkout dev
            git pull origin dev
            docker compose down
            docker compose build
            docker compose up -d

            docker compose ps
            docker compose logs --tail=30 api
          EOF