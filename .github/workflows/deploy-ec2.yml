name: Deploy to EC2

on:
  push:
    branches:
      - dev
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up SSH
        uses: webfactory/ssh-agent@v0.5.4
        with:
          ssh-private-key: ${{ secrets.EC2_SSH_KEY }}

      - name: Deploy to EC2 via SSH
        env:
          SECRET_PWD: ${{ secrets.SECRET_PWD }}
          SALT_ISSUER_DID: ${{ secrets.SALT_ISSUER_DID }}
          SALT_ISSUER_CREDENTIALS: ${{ secrets.SALT_ISSUER_CREDENTIALS }}
          PINATA_JWT_TOKEN: ${{ secrets.PINATA_JWT_TOKEN }}
        run: |
          ssh -o StrictHostKeyChecking=no ${{ secrets.EC2_HOST }} << EOF
            cd ~/identity

            echo "DWN_URL=''" > .env
            echo "SSI_PROJECT_NAME='TBD'" >> .env
            echo "GATEWAY_URI=https://dht.iovf.org" >> .env
            echo "DB_USER=user" >> .env
            echo "DB_PASSWORD='password'" >> .env
            echo "DB_HOST=database" >> .env
            echo "DB_NAME=iovf-identity" >> .env
            echo "MAILER_TRANSPORT_HOST='smtp.gmail.com'" >> .env
            echo "MAIL_USER='ida@iovf.org'" >> .env
            echo "MAIL_PASSWORD='sziwpnlooukzfcwo'" >> .env
            echo "SECRET_PWD=$SECRET_PWD" >> .env
            echo "SALT_ISSUER_DID=$SALT_ISSUER_DID" >> .env
            echo "SALT_ISSUER_CREDENTIALS=$SALT_ISSUER_CREDENTIALS" >> .env
            echo "MAIL_ADDRESS=ida@iovf.org" >> .env
            echo "PINATA_JWT_TOKEN=${PINATA_JWT_TOKEN}" >> .env

            git checkout dev
            git pull origin dev
            docker compose down
            docker compose build
            docker compose up -d

            docker compose ps
            docker compose logs --tail=30 api
          EOF