name: Build and Deploy

on:
  push:
    branches: [dev]

permissions:
  id-token: write
  contents: read

jobs:
  build-and-deploy:
    name: Deploy Infra
    runs-on: ubuntu-latest
    environment: dev

    steps:
    - name: Checkout code
      uses: actions/checkout@v2

    - name: Log into Azure
      uses: azure/login@v1
      with:
        client-id: ${{ secrets.AZURE_CLIENT_ID }}
        tenant-id: ${{ secrets.AZURE_TENANT_ID }}
        subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

    - name: Build and push Docker image
      run: |
        az acr login --name identitycace
        docker build . -t identitycace.azurecr.io/backend:${{ github.run_number }}
        docker push identitycace.azurecr.io/backend:${{ github.run_number }}

    - name: Copy files via ssh password
      uses: appleboy/scp-action@v0.1.3
      with:
        host: ${{ secrets.DEV_VM_HOST }}
        username: "azureuser"
        key: ${{ secrets.DEV_VM_SSH }}
        source: "."
        target: "/home/azureuser"


    - name: Check if Azure Container App exists
      id: check-app
      run: |
          az containerapp show --resource-group identity-backend-resources --name identity-dev || echo "exists=false" >> $GITHUB_OUTPUT

    - name: Pull image - Create Azure Container App
      if: steps.check-app.outputs.exists == 'false'
      env:
        SHORT_SHA: ${{ steps.get_short_sha.outputs.short_sha }}
      run: |
          az containerapp create --name identity-dev --resource-group identity-backend-resources --container-name identity-dev --environment identity-bs --image identitycace.azurecr.io/backend:${{ github.run_number }} --ingress external --target-port 3500 --min-replicas 1 --user-assigned ${{ secrets.AZURE_CLIENT_ID }} --registry-identity ${{ secrets.AZURE_CLIENT_ID }} --registry-server identitycace.azurecr.io

    - name: Update Azure Container App
      run: |
          az containerapp update --name identity-dev --resource-group identity-backend-resources --image identitycace.azurecr.io/backend:${{ github.sha }} 