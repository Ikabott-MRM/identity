name: Build and Deploy

on:
  push:
    branches: [dev]

permissions:
  id-token: write
  contents: read

jobs:
  build-and-deploy:
    name: Deploy Infra
    runs-on: ubuntu-latest
    environment: dev

    steps:
    - name: Checkout code
      uses: actions/checkout@v2

    - name: Log into Azure
      uses: azure/login@v1
      with:
        client-id: ${{ secrets.AZURE_CLIENT_ID }}
        tenant-id: ${{ secrets.AZURE_TENANT_ID }}
        subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

    - name: Build and push Docker image
      run: |
        az acr login --name identitycace
        docker build . -t identitycace.azurecr.io/backend:${{ github.run_number }}
        docker push identitycace.azurecr.io/backend:${{ github.run_number }}

    - name: Copy files via ssh password
      uses: appleboy/scp-action@v0.1.3
      with:
        host: ${{ secrets.DEV_VM_HOST }}
        username: "azureuser"
        key: ${{ secrets.DEV_VM_SSH }}
        source: "."
        target: "/home/azureuser"

    - name: 'Deploy to Azure Container Instances'
      uses: 'azure/aci-deploy@v1'
      with:
        resource-group: ${{ secrets.RESOURCE_GROUP }}
        dns-name-label: ${{ secrets.RESOURCE_GROUP }}${{ github.run_number }}
        image: identitycace.azurecr.io/backend:${{ github.sha }}
        registry-login-server: identitycace.azurecr.io
        name: aci-identity-backend
        location: 'west us'