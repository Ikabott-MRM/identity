name: Build and Deploy

on:
  push:
    branches: [dev]

permissions:
  id-token: write
  contents: read

jobs:
  build-and-deploy:
    name: Deploy Infra
    runs-on: ubuntu-latest
    environment: dev
    steps:
    - name: Checkout code
      uses: actions/checkout@v2

    - name: Log into Azure
      uses: azure/login@v1
      with:
        client-id: ${{ secrets.AZURE_CLIENT_ID }}
        tenant-id: ${{ secrets.AZURE_TENANT_ID }}
        subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

    - name: Build and push Docker image
      run: |
        az acr login --name identitycace
        docker build . -t identitycace.azurecr.io/backend:${{ github.run_number }}
        docker push identitycace.azurecr.io/backend:${{ github.run_number }}

    - name: Stop and remove the old container and run the recently pushed image
      uses: appleboy/ssh-action@v0.1.7
      env:
        ACR_REGISTRY: identitycace.azurecr.io
        IMAGE_TAG: ${{ github.run_number }}
      with:
        host: ${{ secrets.DEV_VM_HOST }}
        username: "azureuser"
        key: ${{ secrets.DEV_VM_SSH }}
        envs: ACR_REGISTRY,IMAGE_TAG
        script: |
          chmod +x hub-backend/dev-deploy.sh
          ./hub-backend/dev-deploy.sh develop $ACR_REGISTRY backend $IMAGE_TAG