name: Build and Deploy

on:
  push:
    branches: [dev]

permissions:
  id-token: write
  contents: read

jobs:
  build-and-deploy:
    name: Deploy Infra
    runs-on: ubuntu-latest
    environment: dev

    steps:
    - uses: actions/checkout@v2

    - name: Log into Azure
      uses: azure/login@v1
      with:
        client-id: ${{ secrets.AZURE_CLIENT_ID }}
        tenant-id: ${{ secrets.AZURE_TENANT_ID }}
        subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

    - name: 'Build and push image'
      uses: azure/docker-login@v1
      with:
        login-server: identitycace.azurecr.io
        username: ${{ secrets.AZURE_CLIENT_ID }}
        password: ${{ secrets.AZURE_CLIENT_SECRET }}
    - run: |
        docker build . -t identitycace.azurecr.io/backend:${{ github.sha }}
        docker push identitycace.azurecr.io/backend:${{ github.sha }}

              
    - name: Build and push Docker image
      run: |
        az acr login --identity --name identitycace
        docker build . -t identitycace.azurecr.io/backend:${{ github.sha }}
        docker push identitycace.azurecr.io/backend:${{ github.sha }}